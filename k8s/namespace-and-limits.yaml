---
apiVersion: v1
kind: Namespace
metadata:
  name: bashforge-sessions
  labels:
    app: bashforge
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: session-network-policy
  namespace: bashforge-sessions
spec:
  podSelector:
    matchLabels:
      app: bashforge-session
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Only allow WebSocket connections from the App EC2 (set APP_EC2_IP in setup)
  - from:
    - ipBlock:
        cidr: "0.0.0.0/0"   # Replaced during setup with actual App EC2 IP
    ports:
    - port: 8765
      protocol: TCP
  egress:
  # DNS
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # HTTP/HTTPS for curl/wget/git
  - ports:
    - port: 80
      protocol: TCP
    - port: 443
      protocol: TCP
  # Block AWS metadata endpoint — added via hostAliases if needed
  # Block all other internal traffic by not including any ipBlock rules
---
apiVersion: v1
kind: LimitRange
metadata:
  name: session-limits
  namespace: bashforge-sessions
spec:
  limits:
  - type: Container
    max:
      memory: "150Mi"
      cpu: "300m"
    min:
      memory: "16Mi"
      cpu: "10m"
    default:
      memory: "150Mi"
      cpu: "300m"
    defaultRequest:
      memory: "64Mi"
      cpu: "50m"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: session-quota
  namespace: bashforge-sessions
spec:
  hard:
    pods:             "20"
    requests.memory:  "1280Mi"
    limits.memory:    "3000Mi"
    requests.cpu:     "1"
    limits.cpu:       "6"
    count/services:   "25"
